<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NostrScope — Nostr Event Explorer</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-hover: #242424;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #7c8aff;
            --accent-hover: #5f6fd1;
            --danger: #ff6b6b;
            --radius: 8px;
            --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text); font-family: var(--font);
            line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column;
        }
        .header { border-bottom: 1px solid var(--border); padding: 1.5rem 1rem; text-align: center; }
        .header-inner { max-width: 800px; margin: 0 auto; }
        .logo { font-size: 2rem; font-weight: 600; }
        .subtitle { color: var(--text-secondary); font-size: 0.95rem; margin-top: 0.25rem; }
        .main-container { flex: 1; max-width: 900px; width: 100%; margin: 0 auto; padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; }
        .input-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
        .input-row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
        .event-input {
            flex: 1 1 200px; background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 0.7rem 1rem; color: var(--text);
            font-size: 0.95rem; outline: none;
        }
        .event-input:focus { border-color: var(--accent); }
        .input-hints { margin-top: 0.5rem; font-size: 0.8rem; color: var(--text-secondary); }
        .input-hints code { background: var(--surface-hover); padding: 0.1rem 0.4rem; border-radius: 4px; }
        .btn {
            padding: 0.5rem 1rem; border: 1px solid transparent; border-radius: var(--radius);
            cursor: pointer; font-size: 0.9rem; font-weight: 500; background: var(--surface-hover);
            color: var(--text); white-space: nowrap; transition: background 0.2s;
        }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: transparent; border-color: var(--border); }
        .btn-secondary:hover { background: var(--surface-hover); border-color: #555; }
        .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
        .btn-text { background: none; border: none; color: var(--accent); padding: 0.25rem 0.5rem; text-decoration: underline; cursor: pointer; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
        .card-section-title { font-size: 1.1rem; margin-bottom: 0.8rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
        .status-section { display: flex; justify-content: center; }
        .status-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; width: 100%; text-align: center; }
        .spinner {
            width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 0.8rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-messages { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1rem; }
        .progress-bar { width: 100%; height: 6px; border-radius: 4px; appearance: none; background: var(--surface-hover); }
        .progress-bar::-webkit-progress-value { background: var(--accent); border-radius: 4px; }
        .error-card { border-left: 4px solid var(--danger); color: #ffaaaa; padding: 1rem; }
        .original-event-card .event-detail { display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; margin-bottom: 0.8rem; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--surface-hover); object-fit: cover; }
        .event-meta { display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; font-size: 0.85rem; color: var(--text-secondary); }
        .event-content { white-space: pre-wrap; word-break: break-word; margin: 0.8rem 0; }
        .event-images img { max-width: 100%; border-radius: var(--radius); margin-top: 0.5rem; }
        .hashtags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.5rem; }
        .hashtag { background: var(--surface-hover); color: var(--accent); font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 12px; }
        .event-actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; }
        .stat-item { background: var(--surface-hover); padding: 0.5rem; border-radius: var(--radius); display: flex; justify-content: space-between; }
        .stat-label { color: var(--text-secondary); font-size: 0.85rem; }
        .stat-value { font-weight: 600; }
        .filter-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .chip {
            background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
            padding: 0.3rem 0.8rem; border-radius: 16px; font-size: 0.85rem; cursor: pointer;
        }
        .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .timeline-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
        .event-count { font-size: 0.85rem; color: var(--text-secondary); }
        .sort-select { background: var(--surface-hover); border: 1px solid var(--border); color: var(--text); padding: 0.3rem 0.6rem; border-radius: var(--radius); }
        .timeline { display: flex; flex-direction: column; gap: 0.5rem; max-height: 600px; overflow-y: auto; }
        .timeline-item { background: var(--surface-hover); border-radius: var(--radius); padding: 0.75rem; border-left: 3px solid var(--border); }
        .timeline-item.reply { border-left-color: #7c8aff; }
        .timeline-item.reaction { border-left-color: #ff8b8b; }
        .timeline-item.repost { border-left-color: #6fcf97; }
        .timeline-item.quote { border-left-color: #f2c94c; }
        .timeline-item.payment { border-left-color: #bb6bd9; }
        .export-buttons { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 500px; }
        .modal-wide { max-width: 700px; }
        .relay-textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.75rem; border-radius: var(--radius); resize: vertical; font-family: monospace; }
        .json-viewer { background: #0c0c0c; color: #d4d4d4; padding: 1rem; border-radius: var(--radius); max-height: 60vh; overflow: auto; font-family: monospace; white-space: pre-wrap; }
        .footer { border-top: 1px solid var(--border); padding: 1rem; text-align: center; font-size: 0.8rem; color: var(--text-secondary); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/nostr-tools@2.10.1/lib/nostr.bundle.js" defer></script>
    <script defer>
        const AppState = {
            relays: [],
            pool: null,
            originalEvent: null,
            relatedEvents: [],
            profiles: {},
            filter: 'all',
            sort: 'newest',
            activeSubs: []
        };
        const DEFAULT_RELAYS = [
            'wss://relay.damus.io',
            'wss://relay.primal.net',
            'wss://nos.lol',
        ];

        function escapeHTML(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function formatTime(ts) { return new Date(ts * 1000).toLocaleString(); }
        function shortId(id) { return id ? id.slice(0,8)+'…' : ''; }

        function parseRef(input) {
            input = input.trim();
            if (!input) return null;
            if (input.startsWith('http')) {
                try { const u = new URL(input); return parseRef(u.pathname.split('/').pop()); } catch{}
            }
            if (input.startsWith('nostr:')) return parseRef(input.slice(6));
            if (input.startsWith('note1') || input.startsWith('nevent1')) {
                try {
                    const { type, data } = NostrTools.nip19.decode(input);
                    return type === 'note' ? { id: data } : type === 'nevent' ? { id: data.id } : null;
                } catch {}
            }
            return /^[0-9a-fA-F]{64}$/.test(input) ? { id: input } : null;
        }

        // ---------- UI helpers ----------
        function status(msg, pct) {
            document.getElementById('statusSection').style.display = 'block';
            document.getElementById('statusMessages').textContent = msg;
            if (pct != null) document.getElementById('progressBar').value = pct;
        }
        function hideStatus() { document.getElementById('statusSection').style.display = 'none'; }
        function showError(msg) {
            document.getElementById('errorSection').style.display = 'block';
            document.getElementById('errorCard').textContent = '⚠️ ' + msg;
        }
        function hideError() { document.getElementById('errorSection').style.display = 'none'; }
        function showResults() { document.getElementById('resultsPanel').style.display = 'flex'; }
        function hideResults() { document.getElementById('resultsPanel').style.display = 'none'; }

        // ---------- Pool with safe init ----------
        async function getPool() {
            if (AppState.pool && typeof AppState.pool.sub === 'function') return AppState.pool;
            if (typeof NostrTools === 'undefined' || !NostrTools.SimplePool) {
                throw new Error('Nostr tools not loaded. Refresh the page.');
            }
            AppState.pool = new NostrTools.SimplePool();
            const urls = AppState.relays.length ? AppState.relays : DEFAULT_RELAYS;
            AppState.relays = urls;
            const results = await Promise.allSettled(
                urls.map(url => AppState.pool.ensureRelay(url).catch(e => {
                    console.warn(`Relay ${url} unreachable: ${e?.message || e}`);
                }))
            );
            return AppState.pool;
        }

        async function fetchOriginal(eventId) {
            status('Connecting...', 5);
            const pool = await getPool();
            status('Fetching original event...', 10);
            const events = await pool.querySync(AppState.relays, { ids: [eventId] }, { maxWait: 8000 });
            if (!events.length) throw new Error('Event not found on any relay.');
            AppState.originalEvent = events[0];
            await loadProfiles([AppState.originalEvent.pubkey]);
            return AppState.originalEvent;
        }

        async function loadProfiles(pubkeys) {
            const missing = pubkeys.filter(pk => !AppState.profiles[pk]);
            if (!missing.length) return;
            status('Loading profiles...', 30);
            const events = await AppState.pool.querySync(AppState.relays, { kinds: [0], authors: missing }, { maxWait: 5000 });
            for (const ev of events) {
                try {
                    const meta = JSON.parse(ev.content);
                    AppState.profiles[ev.pubkey] = {
                        name: meta.name || meta.display_name || shortId(ev.pubkey),
                        picture: meta.picture || '',
                        nip05: meta.nip05 || '',
                        npub: NostrTools.nip19.npubEncode(ev.pubkey)
                    };
                } catch {}
            }
            for (const pk of missing) {
                if (!AppState.profiles[pk]) AppState.profiles[pk] = {
                    name: shortId(pk), picture: '', nip05: '', npub: NostrTools.nip19.npubEncode(pk)
                };
            }
        }

        async function searchRelated(eventId) {
            status('Searching replies, reactions, zaps...', 40);
            AppState.relatedEvents = [];
            AppState.activeSubs.forEach(s => s.unsub());
            AppState.activeSubs = [];
            const pool = AppState.pool;
            if (!pool || typeof pool.sub !== 'function') throw new Error('Relay pool not ready.');

            const filters = [
                { kinds: [1, 6, 7, 9735, 9734], '#e': [eventId] }
            ];
            const sub = pool.sub(AppState.relays, filters);
            AppState.activeSubs.push(sub);
            return new Promise((resolve) => {
                const timeout = setTimeout(() => {
                    sub.unsub();
                    resolve(AppState.relatedEvents);
                }, 15000);
                sub.on('event', (ev) => {
                    if (!AppState.relatedEvents.some(e => e.id === ev.id)) {
                        AppState.relatedEvents.push(ev);
                        document.getElementById('progressBar').value = Math.min(60 + AppState.relatedEvents.length, 95);
                    }
                });
                sub.on('eose', () => {
                    clearTimeout(timeout);
                    resolve(AppState.relatedEvents);
                });
            });
        }

        function categorize() {
            const e = AppState.originalEvent;
            return {
                replies: AppState.relatedEvents.filter(ev => ev.kind === 1 && ev.tags.some(t => t[0]==='e' && t[1]===e?.id)),
                reactions: AppState.relatedEvents.filter(ev => ev.kind === 7),
                reposts: AppState.relatedEvents.filter(ev => ev.kind === 6),
                quotes: AppState.relatedEvents.filter(ev => ev.kind === 1 && ev.tags.some(t => t[0]==='e' && t[1]===e?.id) && ev.content.includes('nostr:')),
                payments: AppState.relatedEvents.filter(ev => [9735,9734].includes(ev.kind)),
                other: AppState.relatedEvents.filter(ev => ![1,6,7,9735,9734].includes(ev.kind))
            };
        }

        function renderOriginal() {
            const ev = AppState.originalEvent;
            if (!ev) return;
            const p = AppState.profiles[ev.pubkey] || {};
            const hashtags = ev.tags.filter(t => t[0]==='t').map(t => t[1]);
            const images = ev.tags.filter(t => t[0]==='image').map(t => t[1]);
            const html = `
                <div class="event-detail">
                    <img class="avatar" src="${escapeHTML(p.picture)}" onerror="this.style.display='none'">
                    <div>
                        <strong>${escapeHTML(p.name)}</strong>
                        <div class="event-meta">
                            <span>npub: ${escapeHTML(shortId(p.npub,12))}</span>
                            <span>Kind ${ev.kind}</span>
                            <span>${formatTime(ev.created_at)}</span>
                        </div>
                    </div>
                </div>
                <div class="event-content">${escapeHTML(ev.content)}</div>
                ${images.length ? '<div class="event-images">'+images.map(u=>`<img src="${escapeHTML(u)}">`).join('')+'</div>' : ''}
                ${hashtags.length ? '<div class="hashtags">'+hashtags.map(h=>`<span class="hashtag">#${escapeHTML(h)}</span>`).join('')+'</div>' : ''}
                <div class="event-actions">
                    <button class="btn btn-secondary btn-sm raw-btn" data-json='${encodeURIComponent(JSON.stringify(ev))}'>Raw JSON</button>
                    <button class="btn btn-secondary btn-sm copy-btn" data-json='${encodeURIComponent(JSON.stringify(ev))}'>Copy JSON</button>
                    <button class="btn btn-secondary btn-sm dl-btn" data-json='${encodeURIComponent(JSON.stringify(ev))}'>Download</button>
                </div>`;
            document.getElementById('originalEventContent').innerHTML = html;
            bindButtons(document.getElementById('originalEventContent'));
        }

        function renderStats() {
            const cats = categorize();
            const authors = new Set(AppState.relatedEvents.map(e=>e.pubkey)).size;
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-item"><span class="stat-label">Replies</span><span class="stat-value">${cats.replies.length}</span></div>
                <div class="stat-item"><span class="stat-label">Reposts</span><span class="stat-value">${cats.reposts.length}</span></div>
                <div class="stat-item"><span class="stat-label">Reactions</span><span class="stat-value">${cats.reactions.length}</span></div>
                <div class="stat-item"><span class="stat-label">Quotes</span><span class="stat-value">${cats.quotes.length}</span></div>
                <div class="stat-item"><span class="stat-label">Payments</span><span class="stat-value">${cats.payments.length}</span></div>
                <div class="stat-item"><span class="stat-label">Unique Authors</span><span class="stat-value">${authors}</span></div>
                <div class="stat-item"><span class="stat-label">Events Loaded</span><span class="stat-value">${AppState.relatedEvents.length}</span></div>`;
        }

        function renderTimeline() {
            const cats = categorize();
            let list = AppState.relatedEvents;
            if (AppState.filter === 'replies') list = cats.replies;
            else if (AppState.filter === 'reactions') list = cats.reactions;
            else if (AppState.filter === 'reposts') list = cats.reposts;
            else if (AppState.filter === 'quotes') list = cats.quotes;
            else if (AppState.filter === 'payments') list = cats.payments;
            else if (AppState.filter === 'other') list = cats.other;
            if (AppState.sort === 'newest') list.sort((a,b)=>b.created_at - a.created_at);
            else list.sort((a,b)=>a.created_at - b.created_at);
            document.getElementById('eventCount').textContent = `${list.length} events`;
            document.getElementById('timeline').innerHTML = list.map(ev => {
                const p = AppState.profiles[ev.pubkey] || {};
                let cls = '';
                if (cats.replies.includes(ev)) cls='reply';
                else if (cats.reactions.includes(ev)) cls='reaction';
                else if (cats.reposts.includes(ev)) cls='repost';
                else if (cats.quotes.includes(ev)) cls='quote';
                else if (cats.payments.includes(ev)) cls='payment';
                return `<div class="timeline-item ${cls}">
                    <strong>${escapeHTML(p.name)}</strong> <small>${formatTime(ev.created_at)} · Kind ${ev.kind}</small>
                    <div>${escapeHTML(ev.content)}</div>
                    <button class="btn btn-secondary btn-sm raw-btn" data-json='${encodeURIComponent(JSON.stringify(ev))}' style="margin-top:0.3rem">Raw JSON</button>
                </div>`;
            }).join('');
            bindButtons(document.getElementById('timeline'));
        }

        function bindButtons(parent) {
            parent.querySelectorAll('.raw-btn').forEach(b => b.onclick = () => openJsonModal(decodeURIComponent(b.dataset.json)));
            parent.querySelectorAll('.copy-btn').forEach(b => b.onclick = () => navigator.clipboard.writeText(decodeURIComponent(b.dataset.json)).then(()=>alert('Copied!')));
            parent.querySelectorAll('.dl-btn').forEach(b => {
                b.onclick = () => {
                    const blob = new Blob([decodeURIComponent(b.dataset.json)],{type:'application/json'});
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                    a.download = 'event.json'; a.click();
                };
            });
        }

        function openJsonModal(json) {
            document.getElementById('jsonViewer').textContent = json;
            document.getElementById('jsonModal').style.display = 'flex';
        }

        // Export helpers
        function downloadFile(name, content) {
            const blob = new Blob([content],{type:'text/plain'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click();
        }

        async function analyze() {
            hideError(); hideResults();
            const input = document.getElementById('eventInput').value.trim();
            const ref = parseRef(input);
            if (!ref) return showError('Invalid identifier. Use note1, nevent1, hex ID, or URL.');
            try {
                AppState.originalEvent = null; AppState.relatedEvents = []; AppState.profiles = {};
                AppState.activeSubs.forEach(s=>s.unsub()); AppState.activeSubs = [];
                await fetchOriginal(ref.id);
                await searchRelated(ref.id);
                status('Complete.', 100);
                setTimeout(() => { hideStatus(); showResults(); renderAll(); }, 200);
            } catch (err) {
                hideStatus();
                showError(err.message || 'Unknown error');
            }
        }

        function renderAll() { renderOriginal(); renderStats(); renderTimeline(); }

        function clearAll() {
            document.getElementById('eventInput').value = '';
            hideResults(); hideError(); hideStatus();
            AppState.originalEvent = null; AppState.relatedEvents = [];
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            AppState.relays = (localStorage.getItem('nostrscope_relays') || DEFAULT_RELAYS.join('\n')).split('\n').map(s=>s.trim()).filter(Boolean);
            document.getElementById('analyzeBtn').onclick = analyze;
            document.getElementById('clearBtn').onclick = clearAll;
            document.getElementById('copyIdBtn').onclick = () => {
                const id = AppState.originalEvent?.id || parseRef(document.getElementById('eventInput').value)?.id;
                if (id) navigator.clipboard.writeText(id).then(()=>alert('Copied!'));
                else alert('No event ID to copy.');
            };
            document.getElementById('filterChips').addEventListener('click', e => {
                if (e.target.classList.contains('chip')) {
                    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
                    e.target.classList.add('active');
                    AppState.filter = e.target.dataset.filter;
                    renderTimeline();
                }
            });
            document.getElementById('sortOrder').onchange = e => { AppState.sort = e.target.value; renderTimeline(); };
            document.getElementById('exportOriginalJson').onclick = () => AppState.originalEvent && downloadFile('original.json', JSON.stringify(AppState.originalEvent,null,2));
            document.getElementById('exportRelatedJson').onclick = () => downloadFile('related.json', JSON.stringify(AppState.relatedEvents,null,2));
            document.getElementById('exportCombinedJson').onclick = () => downloadFile('combined.json', JSON.stringify({original:AppState.originalEvent,related:AppState.relatedEvents},null,2));
            document.getElementById('exportCsv').onclick = () => {
                const all = [AppState.originalEvent, ...AppState.relatedEvents];
                const csv = 'id,pubkey,kind,created_at,content\n' + all.map(e=>`"${e.id}","${e.pubkey}",${e.kind},${e.created_at},"${e.content.replace(/"/g,'""')}"`).join('\n');
                downloadFile('nostrscope.csv', csv);
            };
            // Relay settings modal
            const relayModal = document.getElementById('relayModal');
            document.getElementById('relaySettingsBtn').onclick = () => {
                document.getElementById('relayTextarea').value = AppState.relays.join('\n');
                relayModal.style.display = 'flex';
            };
            document.getElementById('relaySaveBtn').onclick = () => {
                const urls = document.getElementById('relayTextarea').value.split('\n').map(s=>s.trim()).filter(Boolean);
                localStorage.setItem('nostrscope_relays', urls.join('\n'));
                AppState.relays = urls;
                relayModal.style.display = 'none';
            };
            document.getElementById('relayResetBtn').onclick = () => {
                document.getElementById('relayTextarea').value = DEFAULT_RELAYS.join('\n');
                localStorage.setItem('nostrscope_relays', DEFAULT_RELAYS.join('\n'));
                AppState.relays = DEFAULT_RELAYS;
                relayModal.style.display = 'none';
            };
            document.getElementById('relayCancelBtn').onclick = () => relayModal.style.display = 'none';
            relayModal.onclick = e => { if (e.target === relayModal) relayModal.style.display = 'none'; };
            // JSON modal
            const jsonModal = document.getElementById('jsonModal');
            document.getElementById('jsonCloseBtn').onclick = () => jsonModal.style.display = 'none';
            document.getElementById('jsonCopyBtn').onclick = () => navigator.clipboard.writeText(document.getElementById('jsonViewer').textContent).then(()=>alert('Copied!'));
            document.getElementById('jsonDownloadBtn').onclick = () => downloadFile('event.json', document.getElementById('jsonViewer').textContent);
            jsonModal.onclick = e => { if (e.target === jsonModal) jsonModal.style.display = 'none'; };
        });
    </script>
</head>
<body>
    <header class="header"><div class="header-inner"><h1 class="logo">NostrScope</h1><p class="subtitle">Explore everything connected to a Nostr event</p></div></header>
    <main class="main-container">
        <section class="input-section">
            <div class="input-row">
                <input type="text" id="eventInput" class="event-input" placeholder="Paste a Nostr event ID, note1..., nevent1..., or URL..." autocomplete="off">
                <button id="analyzeBtn" class="btn btn-primary">Analyze</button>
                <button id="clearBtn" class="btn btn-secondary">Clear</button>
                <button id="copyIdBtn" class="btn btn-secondary">Copy ID</button>
            </div>
            <div class="input-hints"><span>Accepts: <code>note1…</code> <code>nevent1…</code> <code>hex ID</code> <code>nostr:…</code> <code>https://…</code></span></div>
        </section>
        <section class="status-section" id="statusSection" style="display:none;">
            <div class="status-card">
                <div class="spinner"></div>
                <div class="status-messages" id="statusMessages"></div>
                <progress id="progressBar" class="progress-bar" value="0" max="100"></progress>
            </div>
        </section>
        <section class="error-section" id="errorSection" style="display:none;"><div class="card error-card" id="errorCard"></div></section>
        <section class="results-panel" id="resultsPanel" style="display:none; flex-direction:column; gap:1.5rem;">
            <div class="card"><h2 class="card-section-title">📌 Original Event</h2><div id="originalEventContent"></div></div>
            <div class="card"><h2 class="card-section-title">📊 Statistics</h2><div class="stats-grid" id="statsGrid"></div></div>
            <div class="card">
                <h2 class="card-section-title">🔍 Filters</h2>
                <div class="filter-chips" id="filterChips">
                    <button class="chip active" data-filter="all">All</button>
                    <button class="chip" data-filter="replies">💬 Replies</button>
                    <button class="chip" data-filter="reactions">❤️ Reactions</button>
                    <button class="chip" data-filter="reposts">🔄 Reposts</button>
                    <button class="chip" data-filter="quotes">💬 Quotes</button>
                    <button class="chip" data-filter="payments">⚡ Payments</button>
                    <button class="chip" data-filter="other">📦 Other</button>
                </div>
            </div>
            <div class="card">
                <h2 class="card-section-title">🕒 Related Events</h2>
                <div class="timeline-controls">
                    <span id="eventCount" class="event-count"></span>
                    <select id="sortOrder" class="sort-select"><option value="newest">Newest first</option><option value="oldest">Oldest first</option></select>
                </div>
                <div class="timeline" id="timeline"></div>
            </div>
            <div class="card">
                <h2 class="card-section-title">📥 Export</h2>
                <div class="export-buttons">
                    <button id="exportOriginalJson" class="btn btn-secondary">Original JSON</button>
                    <button id="exportRelatedJson" class="btn btn-secondary">Related JSON</button>
                    <button id="exportCombinedJson" class="btn btn-secondary">Combined JSON</button>
                    <button id="exportCsv" class="btn btn-secondary">CSV Summary</button>
                </div>
            </div>
        </section>
    </main>
    <div class="modal-overlay" id="relayModal" style="display:none;">
        <div class="modal">
            <h2>⚙️ Relay Settings</h2>
            <textarea id="relayTextarea" class="relay-textarea" rows="8"></textarea>
            <div class="modal-buttons" style="margin-top:1rem; display:flex; gap:0.5rem; justify-content:flex-end;">
                <button id="relaySaveBtn" class="btn btn-primary">Save & Close</button>
                <button id="relayResetBtn" class="btn btn-secondary">Reset Defaults</button>
                <button id="relayCancelBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="jsonModal" style="display:none;">
        <div class="modal modal-wide">
            <h2>📄 Raw Event JSON</h2>
            <div style="display:flex; gap:0.5rem; margin-bottom:0.8rem;">
                <button id="jsonCopyBtn" class="btn btn-secondary btn-sm">Copy</button>
                <button id="jsonDownloadBtn" class="btn btn-secondary btn-sm">Download</button>
                <button id="jsonCloseBtn" class="btn btn-secondary btn-sm">Close</button>
            </div>
            <pre class="json-viewer" id="jsonViewer"></pre>
        </div>
    </div>
    <footer class="footer"><div class="footer-inner"><span>NostrScope</span> <button id="relaySettingsBtn" class="btn btn-text">⚙️ Relay Settings</button></div></footer>
</body>
</html>
