<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>NostrScope — Nostr Event Inspector</title>
    <link rel="stylesheet" href="style.css">
    <!-- nostr-tools v2.23.9 – exposes global NostrTools -->
    <script src="https://unpkg.com/nostr-tools@2.23.9/lib/nostr.bundle.js"></script>
</head>
<body>
    <div class="home-container" id="homeScreen">
        <div class="home-user-area">
            <span id="homeUserStatus" class="user-info">Not logged in</span>
            <button id="homeLoginBtn" class="btn btn-small btn-secondary">🔑 Login</button>
            <button id="homeLogoutBtn" class="btn btn-small btn-danger" style="display:none;">Logout</button>
        </div>

        <div class="home-logo">Nostr<span>Scope</span></div>
        <div class="home-subtitle">Explore every piece of information connected to any Nostr event.</div>
        <div class="search-box">
            <span class="search-icon">🔎</span>
            <input type="text" class="search-input" id="homeSearchInput" placeholder="Paste event ID, note1..., nevent1..., or URL">
            <div class="search-actions"><button class="btn btn-secondary" id="homeClearBtn">✕</button></div>
        </div>
        <div class="home-buttons">
            <button class="btn btn-primary" id="homeAnalyzeBtn">NostrScope Analyze</button>
            <button class="btn btn-secondary" id="homeLuckyBtn">I'm Feeling Lucky</button>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <div class="hint-text">Examples: <code>6b89af99...</code> · <code>note1...</code> · <code>nevent1...</code> · <code>https://njump.me/note1...</code></div>
    </div>

    <div class="results-container" id="resultsScreen">
        <div class="results-header">
            <div class="results-left">
                <div class="results-logo" id="resultsLogo">Nostr<span>Scope</span></div>
                <div class="results-search">
                    <span style="color:var(--text2);margin-right:8px;">🔎</span>
                    <input type="text" id="resultsSearchInput" placeholder="Paste another event...">
                    <button class="btn btn-secondary btn-small" id="resultsSearchBtn">Search</button>
                </div>
            </div>
            <div class="user-area">
                <span id="resultsUserStatus" class="user-info">Not logged in</span>
                <button id="resultsLoginBtn" class="btn btn-small btn-secondary">🔑 Login</button>
                <button id="resultsLogoutBtn" class="btn btn-small btn-danger" style="display:none;">Logout</button>
            </div>
        </div>
        <div class="results-tabs" id="tabsNav">
            <button class="tab-btn active" data-tab="thread">🌳 Thread View</button>
            <button class="tab-btn" data-tab="timeline">⏱ Timeline</button>
            <button class="tab-btn" data-tab="stats">📊 Statistics</button>
            <button class="tab-btn" data-tab="json">{ } Raw JSON</button>
            <button class="tab-btn" data-tab="relays">🔗 Relays</button>
            <button class="tab-btn" data-tab="export">💾 Export</button>
            <button class="tab-btn" data-tab="bch">💸 BCH Payments</button>
        </div>
        <div class="main-content">
            <div class="tab-panel active" id="panel-thread"></div>
            <div class="tab-panel" id="panel-timeline"></div>
            <div class="tab-panel" id="panel-stats"></div>
            <div class="tab-panel" id="panel-json"></div>
            <div class="tab-panel" id="panel-relays"></div>
            <div class="tab-panel" id="panel-export"></div>
            <div class="tab-panel" id="panel-bch"></div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div style="text-align:center;"><div class="spinner"></div><div class="loading-text" id="loadingText">Searching the Nostr universe...</div></div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <div id="modalContainer"></div>

    <script src="scripts.js"></script>
</body>
</html>
