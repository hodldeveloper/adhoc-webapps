<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>NostrScope</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/nostr-tools@2.23.9/lib/nostr.bundle.js"></script>
</head>
<body>
    <div class="app-shell">
        <!-- Home Screen -->
        <div class="home-screen active" id="homeScreen">
            <div class="home-header">
                <div class="home-user-area">
                    <span id="homeUserStatus" class="user-badge">Not logged in</span>
                    <button id="homeLoginBtn" class="btn btn-sm btn-outline">🔑 Login</button>
                    <button id="homeLogoutBtn" class="btn btn-sm btn-outline" style="display:none;">Logout</button>
                    <button id="homeAccountBtn" class="btn btn-sm btn-outline" style="display:none;">👤 My Account</button>
                </div>
            </div>
            <div class="home-logo-area">
                <div class="home-icon">🔍</div>
                <div class="home-title">Nostr<span>Scope</span></div>
                <div class="home-subtitle">Explore any Nostr event or user</div>
            </div>
            <div class="home-search-box">
                <input type="text" class="search-input" id="homeSearchInput" placeholder="event / npub / note / URL" autocomplete="off">
                <button class="btn btn-primary" id="homeAnalyzeBtn">Analyze</button>
                <button class="btn btn-sm btn-outline" id="homeClearBtn" style="padding:6px 10px;">✕</button>
            </div>
            <div class="home-hint">
                <span>Try: note1... · npub1... · nevent1...</span>
            </div>
            <div class="error-msg" id="errorMsg"></div>
        </div>

        <!-- Results Screen -->
        <div class="results-screen" id="resultsScreen">
            <div class="results-header">
                <span class="back-btn" id="resultsBackBtn">←</span>
                <span class="results-title">NostrScope</span>
                <div class="header-actions">
                    <button id="resultsLoginBtn" class="btn btn-sm btn-outline">🔑</button>
                    <button id="resultsAccountBtn" class="btn btn-sm btn-outline" style="display:none;">👤</button>
                </div>
            </div>
            <div class="tab-content" id="tabContent">
                <div class="tab-panel active" id="panel-thread"></div>
                <div class="tab-panel" id="panel-timeline"></div>
                <div class="tab-panel" id="panel-stats"></div>
                <div class="tab-panel" id="panel-json"></div>
                <div class="tab-panel" id="panel-relays"></div>
                <div class="tab-panel" id="panel-export"></div>
                <div class="tab-panel" id="panel-bch"></div>
                <div class="tab-panel" id="panel-profile"></div>
            </div>
            <div class="bottom-nav">
                <button class="nav-btn active" data-tab="thread">🌳</button>
                <button class="nav-btn" data-tab="timeline">⏱</button>
                <button class="nav-btn" data-tab="stats">📊</button>
                <button class="nav-btn" data-tab="json">{}</button>
                <button class="nav-btn" data-tab="relays">🔗</button>
                <button class="nav-btn" data-tab="bch">💸</button>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Connecting...</div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <div id="modalContainer"></div>

    <script src="boost.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
