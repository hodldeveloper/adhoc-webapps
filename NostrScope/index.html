<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>NostrScope</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230f172a'/%3E%3Ctext x='50%25' y='56%25' font-size='34' text-anchor='middle' fill='%23facc15'%3E%F0%9F%94%8D%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer">
    <script src="https://unpkg.com/nostr-tools@2.23.9/lib/nostr.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>
    <div class="app-shell">
        <button id="themeToggleBtn" class="theme-toggle-btn fa-with-label" type="button" aria-label="Dark"><i class="fa-solid fa-moon" aria-hidden="true"></i><span>Dark</span></button>
        <!-- Feed Screen (main) -->
        <div class="screen feed-screen active" id="feedScreen">
            <div class="feed-header">
                <div class="feed-brand">
                    <div class="feed-brand-icon">🔍</div>
                    <div class="feed-brand-text">
                        <div class="feed-brand-title">Nostr<span>Scope</span></div>
                        <div class="feed-brand-subtitle">BCH Feed</div>
                    </div>
                </div>
                <div style="display:flex; gap:8px;">
                    <button id="feedLoginBtn" class="btn btn-sm btn-outline"
                        onclick="window.showLoginModal && window.showLoginModal()">🔑 Login</button>
                    <button class="btn btn-icon" id="refreshFeedBtn">🔄</button>
                </div>
            </div>
            <div class="feed-content" id="feedContent"></div>
        </div>

        <!-- Boosted Screen -->
        <div class="screen feed-screen" id="boostsScreen">
            <div class="feed-header">
                <div class="feed-brand">
                    <div class="feed-brand-icon">🚀</div>
                    <div class="feed-brand-text">
                        <div class="feed-brand-title">Boosted<span>Posts</span></div>
                        <div class="feed-brand-subtitle">Kind 30078</div>
                    </div>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-icon" id="refreshBoostsBtn">🔄</button>
                </div>
            </div>
            <div class="feed-content" id="boostsContent"></div>
        </div>

        <!-- Community Screen -->
        <div class="screen feed-screen" id="communityScreen">
            <div class="feed-header">
                <div class="feed-brand">
                    <div class="feed-brand-icon">🏘️</div>
                    <div class="feed-brand-text">
                        <div class="feed-brand-title">BCH<span>Communities</span></div>
                        <div class="feed-brand-subtitle">Kind 34550</div>
                    </div>
                </div>
                <div style="display:flex; gap:8px;">
                    <button id="newCommunityBtn" class="btn btn-sm btn-outline"
                        onclick="window.createCommunity && window.createCommunity()">🏘️ New Community</button>
                    <button class="btn btn-icon" id="refreshCommunityBtn">🔄</button>
                </div>
            </div>
            <div class="feed-content" id="communityContent"></div>
        </div>

        <!-- Search Screen -->
        <div class="screen search-screen" id="searchScreen">
            <div class="home-logo-area">
                <div class="home-icon">🔍</div>
                <div class="home-title">Nostr<span>Scope</span></div>
                <div class="home-subtitle">Explore any Nostr event or user</div>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="event / npub / note / URL"
                    autocomplete="off">
                <button class="btn btn-primary" id="analyzeBtn">Analyze</button>
            </div>
            <div class="error-msg" id="errorMsg"></div>
            <div class="home-hint">Try: note1... · npub1... · nevent1...</div>
        </div>

        <!-- Profile Screen -->
        <div class="screen profile-screen" id="profileScreen">
            <div class="profile-content" id="profileContent"></div>
        </div>

        <!-- Analysis Screen (detail) -->
        <div class="screen analysis-screen" id="analysisScreen">
            <div class="analysis-header">
                <span class="back-btn" id="analysisBackBtn">← Back</span>
                <span class="analysis-title">Post Detail</span>
            </div>
            <div class="analysis-content" id="analysisContent">
                <div id="panel-thread"></div>
                <div id="panel-timeline"></div>
                <div id="panel-stats"></div>
                <div id="panel-json"></div>
                <div id="panel-relays"></div>
                <div id="panel-bch"></div>
                <div id="panel-profile"></div>
            </div>
        </div>

        <!-- Editor Screen -->
        <div class="screen editor-screen" id="editorScreen">
            <div class="editor-header" style="padding:12px 16px; background:rgba(9,14,23,0.72); backdrop-filter:blur(14px); border-bottom:1px solid rgba(145,163,192,0.2); display:flex; justify-content:space-between; align-items:center;">
                <span class="back-btn" id="editorBackBtn">← Back</span>
                <span class="editor-title" style="font-weight:800; letter-spacing:-0.02em; font-size:1.05rem;">New Article</span>
                <button class="btn btn-primary" id="editorPublishBtn" style="padding:6px 14px; font-size:0.8rem;">Publish</button>
            </div>
            <div class="editor-content" id="editorContent" style="flex:1; overflow-y:auto; padding-bottom:20px;"></div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-btn active" data-screen="feed">📰</button>
            <button class="nav-btn" data-screen="boosts">🚀</button>
            <button class="nav-btn" data-screen="community">🏘️</button>
            <button class="nav-btn" data-screen="search">🔍</button>
            <button class="nav-btn" data-screen="profile">👤</button>
        </div>

    </div>

    <!-- Loading overlay, toasts, modals -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Connecting...</div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <div id="modalContainer"></div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="nav.js"></script>
    <script src="scripts.js"></script>
    <script src="boost.js"></script>
    <script src="feed.js"></script>
    <script src="boosts-feed.js"></script> <!-- ← add this line -->
    <script src="account-tab.js"></script>
    <script src="editor.js"></script>

</body>

</html>
