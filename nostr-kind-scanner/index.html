<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr Custom Kind Explorer</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1c2333;
            --border: #30363d;
            --text: #e6edf3;
            --text2: #8b949e;
            --accent: #58a6ff;
            --accent2: #1f6feb;
            --success: #3fb950;
            --warning: #d29922;
            --error: #f85149;
            --purple: #a371f7;
            --radius: 8px;
            --radius-sm: 5px;
            --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', 'Consolas', 'Courier New', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            --transition: 0.2s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .header { text-align: center; padding: 10px 0 0 0; }
        .header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header .subtitle { color: var(--text2); font-size: 0.9rem; margin-top: 2px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
        .input-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .input-row input {
            flex: 1; min-width: 280px; padding: 12px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
            background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 0.9rem; outline: none;
            transition: border var(--transition), box-shadow var(--transition);
        }
        .input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,0.12); }
        .input-row input::placeholder { color: var(--text2); opacity: 0.6; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 11px 20px; border-radius: var(--radius-sm);
            border: 1px solid transparent; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all var(--transition);
            white-space: nowrap; font-family: var(--font-sans); letter-spacing: 0.2px;
        }
        .btn-primary { background: var(--accent2); color: #fff; border-color: var(--accent2); }
        .btn-primary:hover { background: #388bfd; border-color: #388bfd; box-shadow: 0 4px 14px rgba(31,111,235,0.35); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
        .btn-outline { background: transparent; color: var(--text); border-color: var(--border); }
        .btn-outline:hover { background: var(--surface2); border-color: #5a6575; }
        .btn-sm { padding: 6px 14px; font-size: 0.8rem; border-radius: 4px; }
        .btn-xs { padding: 4px 10px; font-size: 0.72rem; border-radius: 4px; }
        .progress-area { min-height: 20px; }
        .progress-list { display: flex; flex-wrap: wrap; gap: 8px 16px; font-size: 0.85rem; color: var(--text2); }
        .progress-item { display: flex; align-items: center; gap: 5px; }
        .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background var(--transition); }
        .progress-dot.connected { background: var(--success); box-shadow: 0 0 6px rgba(63,185,80,0.5); }
        .progress-dot.failed { background: var(--error); }
        .progress-dot.active { background: var(--warning); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .stat-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 16px; border: 1px solid var(--border); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text2); margin-bottom: 4px; }
        .stat-value { font-size: 1.3rem; font-weight: 700; font-family: var(--font-mono); color: var(--text); word-break: break-all; }
        .stat-value.highlight { color: var(--purple); }
        .stat-value.small { font-size: 0.8rem; }
        .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
        .toolbar .search-input {
            padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg);
            color: var(--text); font-family: var(--font-mono); font-size: 0.85rem; width: 200px; outline: none;
            transition: border var(--transition);
        }
        .toolbar .search-input:focus { border-color: var(--accent); }
        .toolbar .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .table-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); max-height: 55vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 600px; }
        thead { position: sticky; top: 0; z-index: 2; }
        thead th { background: var(--surface2); color: var(--text2); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.6px; padding: 12px 14px; text-align: left; border-bottom: 2px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; transition: color var(--transition); }
        thead th:hover { color: var(--accent); }
        thead th .sort-arrow { margin-left: 4px; font-size: 0.7rem; }
        tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.82rem; white-space: nowrap; }
        tbody tr:nth-child(even) { background: rgba(255,255,255,0.015); }
        tbody tr:hover { background: rgba(88,166,255,0.06); }
        .kind-badge { display: inline-block; background: var(--accent2); color: #fff; padding: 3px 10px; border-radius: 20px; font-weight: 600; font-size: 0.78rem; }
        .no-results { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 1rem; }
        .no-results .icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center;
            justify-content: center; padding: 20px; animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 100%;
            max-width: 800px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .modal-header h3 { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .modal-close { background: none; border: none; color: var(--text2); font-size: 1.5rem; cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: all var(--transition); line-height: 1; }
        .modal-close:hover { color: var(--text); background: var(--surface2); }
        .modal-body { overflow-y: auto; padding: 16px 20px; flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .event-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
        .event-card .event-meta { display: flex; flex-wrap: wrap; gap: 8px 16px; font-size: 0.78rem; color: var(--text2); font-family: var(--font-mono); }
        .event-card .event-meta span { display: inline-flex; align-items: center; gap: 4px; }
        .event-card .event-meta .label { color: var(--text2); font-weight: 500; font-family: var(--font-sans); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.4px; }
        .event-card pre {
            background: #0a0d12; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px;
            overflow-x: auto; font-family: var(--font-mono); font-size: 0.72rem; line-height: 1.5; color: #c9d1d9;
            max-height: 250px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
        }
        .event-card .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .toast {
            position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border);
            padding: 10px 18px; border-radius: var(--radius-sm); font-size: 0.85rem; z-index: 200;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 1.7s forwards; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(10px); } }
        @media (max-width: 600px) {
            .input-row { flex-direction: column; align-items: stretch; }
            .input-row input { min-width: auto; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar .search-input { width: 100%; }
            table { font-size: 0.75rem; }
            thead th, tbody td { padding: 8px 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Nostr Custom Kind Explorer</h1>
            <p class="subtitle">Discover non-standard event kinds published by any npub</p>
        </div>
        <div class="card">
            <div class="input-row">
                <input type="text" id="npubInput" placeholder="Enter npub... (e.g. npub1...)" autocomplete="off" spellcheck="false">
                <button class="btn btn-primary" id="scanBtn" title="Scan relays for custom kinds"><span>🔎</span> Scan</button>
                <button class="btn btn-outline btn-sm" id="clearBtn" title="Clear all results">✕ Clear</button>
            </div>
        </div>
        <div class="progress-area" id="progressArea" style="display:none;">
            <div class="progress-list" id="progressList"></div>
        </div>
        <div class="stats-grid" id="statsGrid" style="display:none;"></div>
        <div class="toolbar" id="toolbar" style="display:none;">
            <input type="text" class="search-input" id="searchInput" placeholder="Filter by kind...">
            <div class="btn-group">
                <button class="btn btn-outline btn-sm" id="exportCSVBtn">📄 Export CSV</button>
                <button class="btn btn-outline btn-sm" id="exportJSONBtn">📦 Export JSON</button>
            </div>
        </div>
        <div class="table-wrapper" id="tableWrapper" style="display:none;">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th data-sort="kind">Kind <span class="sort-arrow">▼</span></th>
                        <th data-sort="count">Count <span class="sort-arrow"></span></th>
                        <th data-sort="firstSeen">First Seen <span class="sort-arrow"></span></th>
                        <th data-sort="latestSeen">Latest Seen <span class="sort-arrow"></span></th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
            <div class="no-results" id="noResults" style="display:none;">
                <span class="icon">📭</span>
                <p>No custom kinds found for this npub.</p>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Events of Kind <span class="kind-badge" id="modalKindBadge"></span></h3>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>
    <div id="toastContainer"></div>
    <script>
        (function() {
            const DEFAULT_RELAYS = [
                'wss://relay.damus.io',
                'wss://nos.lol',
                'wss://relay.primal.net',
                'wss://purplepag.es',
                'wss://relay.snort.social',
            ];
            const STANDARD_KINDS = new Set([0,1,3,5,6,7,8,14,16,20,21,40,41,42,43,44,9734,9735,10002,10019,30023]);
            const RELAY_TIMEOUT_MS = 10000;
            const PAGE_LIMIT = 500;
            const MAX_PAGINATION_ROUNDS = 3;
            const BECH32_ALPHABET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';

            let currentHexPubkey = null;
            let currentNpub = null;
            let allEventsMap = new Map();
            let customKindGroups = new Map();
            let customKindSummaries = [];
            let isScanning = false;
            let abortController = null;
            let sortColumn = 'kind';
            let sortDirection = 'asc';

            const npubInput = document.getElementById('npubInput');
            const scanBtn = document.getElementById('scanBtn');
            const clearBtn = document.getElementById('clearBtn');
            const progressArea = document.getElementById('progressArea');
            const progressList = document.getElementById('progressList');
            const statsGrid = document.getElementById('statsGrid');
            const toolbar = document.getElementById('toolbar');
            const searchInput = document.getElementById('searchInput');
            const tableWrapper = document.getElementById('tableWrapper');
            const resultsBody = document.getElementById('resultsBody');
            const noResults = document.getElementById('noResults');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalKindBadge = document.getElementById('modalKindBadge');
            const modalBody = document.getElementById('modalBody');
            const modalClose = document.getElementById('modalClose');
            const toastContainer = document.getElementById('toastContainer');
            const exportCSVBtn = document.getElementById('exportCSVBtn');
            const exportJSONBtn = document.getElementById('exportJSONBtn');
            const resultsTable = document.getElementById('resultsTable');

            function bech32Decode(bech32Str) {
                if (!bech32Str || bech32Str !== bech32Str.toLowerCase()) throw new Error('Bech32 string must be all lowercase');
                if (bech32Str.length < 8 || bech32Str.length > 90) throw new Error('Bech32 string length out of range');
                const sepIndex = bech32Str.lastIndexOf('1');
                if (sepIndex < 1 || sepIndex + 7 > bech32Str.length) throw new Error('Invalid bech32 format');
                const hrp = bech32Str.slice(0, sepIndex);
                const dataPart = bech32Str.slice(sepIndex + 1);
                if (!/^[a-z]+$/.test(hrp)) throw new Error('HRP must contain only lowercase letters');
                if (hrp.length < 1 || hrp.length > 83) throw new Error('HRP length out of range');
                const dataValues = [];
                for (let i = 0; i < dataPart.length; i++) {
                    const val = BECH32_ALPHABET.indexOf(dataPart[i]);
                    if (val === -1) throw new Error(`Invalid bech32 character: '${dataPart[i]}'`);
                    dataValues.push(val);
                }
                if (!bech32VerifyChecksum(hrp, dataValues)) throw new Error('Bech32 checksum verification failed');
                return { hrp, data: dataValues.slice(0, -6) };
            }
            function bech32Polymod(values) {
                const GEN = [0x3b6a57b2,0x26508e6d,0x1ea119fa,0x3d4233dd,0x2a1462b3];
                let chk = 1;
                for (let v of values) {
                    const top = chk >> 25;
                    chk = ((chk & 0x1ffffff) << 5) ^ v;
                    for (let j = 0; j < 5; j++) if ((top >> j) & 1) chk ^= GEN[j];
                }
                return chk;
            }
            function bech32HrpExpand(hrp) {
                const result = [];
                for (let i=0;i<hrp.length;i++) result.push(hrp.charCodeAt(i) >> 5);
                result.push(0);
                for (let i=0;i<hrp.length;i++) result.push(hrp.charCodeAt(i) & 31);
                return result;
            }
            function bech32VerifyChecksum(hrp, data) {
                return bech32Polymod(bech32HrpExpand(hrp).concat(data)) === 1;
            }
            function convert5to8Bits(data5bit, expectedBytes) {
                let bitBuffer=0, bitCount=0, result=[];
                for (const v of data5bit) {
                    bitBuffer = (bitBuffer << 5) | v;
                    bitCount += 5;
                    while (bitCount >= 8) { bitCount -= 8; result.push((bitBuffer >> bitCount) & 0xff); }
                }
                if (expectedBytes !== null && result.length !== expectedBytes) throw new Error('Unexpected byte count');
                return result;
            }
            function decodeNpub(npub) {
                const trimmed = npub.trim();
                if (!trimmed.startsWith('npub1')) throw new Error('Invalid npub');
                const {hrp, data} = bech32Decode(trimmed);
                if (hrp !== 'npub') throw new Error('Not an npub');
                const bytes = convert5to8Bits(data, 32);
                return bytes.map(b => b.toString(16).padStart(2,'0')).join('');
            }

            function formatDate(ts) { if (!ts || isNaN(ts)) return '—'; const d = new Date(ts*1000); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
            function formatDateTime(ts) { if (!ts || isNaN(ts)) return '—'; return new Date(ts*1000).toISOString().replace('T',' ').slice(0,19); }
            function showToast(msg, type='info') {
                const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
                if (type==='error') t.style.borderColor='var(--error)';
                if (type==='success') t.style.borderColor='var(--success)';
                toastContainer.appendChild(t);
                setTimeout(() => t.remove(), 2200);
            }
            async function copyToClipboard(text, label='Text') {
                try { await navigator.clipboard.writeText(text); } catch {
                    const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
                }
                showToast(`${label} copied!`,'success');
            }

            function fetchFromRelay(relayUrl, hexPubkey, signal, onStatus) {
                return new Promise((resolve, reject) => {
                    const events=[], seenIds=new Set();
                    let socket=null, subId=null, round=0, oldest=null, timeout=null, resolved=false;
                    function finish(err) {
                        if (resolved) return; resolved=true;
                        if (timeout) clearTimeout(timeout);
                        if (socket) {
                            if (subId && socket.readyState===WebSocket.OPEN) try{socket.send(JSON.stringify(['CLOSE',subId]))}catch(_){}
                            socket.close();
                        }
                        err ? reject(err) : resolve(events);
                    }
                    function resetTimeout() {
                        if (timeout) clearTimeout(timeout);
                        timeout = setTimeout(() => {
                            if (events.length>0 && round<MAX_PAGINATION_ROUNDS) return;
                            finish(new Error(`Timeout: ${relayUrl}`));
                        }, RELAY_TIMEOUT_MS);
                    }
                    function sendReq() {
                        if (resolved) return;
                        round++; subId = 'sub-'+Math.random().toString(36).slice(2,10)+'-p'+round;
                        const filter = { authors:[hexPubkey], limit:PAGE_LIMIT };
                        if (oldest !== null) filter.until = oldest - 1;
                        try { socket.send(JSON.stringify(['REQ',subId,filter])); } catch(e) { finish(new Error('Send failed')); return; }
                        resetTimeout();
                    }
                    try { socket = new WebSocket(relayUrl); } catch(e) { finish(new Error('Cannot connect')); return; }
                    socket.onopen = () => { if(resolved) return; onStatus(relayUrl,'connected'); sendReq(); };
                    socket.onmessage = (msg) => {
                        if(resolved) return; resetTimeout();
                        let parsed; try { parsed=JSON.parse(msg.data); } catch{return;}
                        if(!Array.isArray(parsed)||parsed.length<2) return;
                        const [type, id, ...rest] = parsed;
                        if(type==='EVENT' && id===subId && rest[0]) {
                            const ev = rest[0];
                            if(ev.id && !seenIds.has(ev.id)) { seenIds.add(ev.id); events.push({event:ev, relayUrl}); if(oldest===null||ev.created_at<oldest) oldest=ev.created_at; }
                        }
                        if(type==='EOSE' && id===subId) {
                            if(events.length >= PAGE_LIMIT*0.8 && round<MAX_PAGINATION_ROUNDS && oldest!==null) setTimeout(() => { if(!resolved) sendReq(); }, 200);
                            else finish(null);
                        }
                    };
                    socket.onerror = () => { onStatus(relayUrl,'error'); };
                    socket.onclose = () => { if(resolved) return; if(events.length>0) finish(null); else finish(new Error('Disconnected')); };
                    if(signal) signal.addEventListener('abort', ()=>finish(new Error('Aborted')), {once:true});
                    resetTimeout();
                });
            }

            async function connectRelays(hexPubkey, signal, onRelayStatus, onEventCount) {
                const merged = new Map(); let total=0;
                const promises = DEFAULT_RELAYS.map(async url => {
                    try {
                        onRelayStatus(url,'connecting');
                        const res = await fetchFromRelay(url, hexPubkey, signal, (u,s)=>onRelayStatus(u,s));
                        for (const {event, relayUrl} of res) {
                            if (merged.has(event.id)) {
                                const ex = merged.get(event.id);
                                if (!ex.relayUrls.includes(relayUrl)) ex.relayUrls.push(relayUrl);
                            } else { merged.set(event.id, {event, relayUrls:[relayUrl]}); total++; onEventCount(total); }
                        }
                        return {url, ok:true};
                    } catch(e) { onRelayStatus(url,'failed'); return {url, ok:false}; }
                });
                const results = await Promise.allSettled(promises);
                if (merged.size===0 && !results.some(r=>r.value&&r.value.ok)) throw new Error('All relays failed');
                return merged;
            }

            function mergeEvents(eventsMap) {
                for (const [id, data] of eventsMap) {
                    if (!allEventsMap.has(id)) allEventsMap.set(id, data);
                    else { const ex = allEventsMap.get(id); for (const u of data.relayUrls) if (!ex.relayUrls.includes(u)) ex.relayUrls.push(u); }
                }
            }

            function detectCustomKinds() {
                const kindMap = new Map();
                for (const [, data] of allEventsMap) {
                    const k = data.event.kind;
                    if (k===undefined || STANDARD_KINDS.has(k)) continue;
                    if (!kindMap.has(k)) kindMap.set(k, []);
                    kindMap.get(k).push({event:data.event, relayUrls:data.relayUrls});
                }
                return kindMap;
            }

            function buildSummaries(groups) {
                const arr = [];
                for (const [kind, events] of groups) {
                    let first=Infinity, latest=-Infinity;
                    for (const {event} of events) { const t=event.created_at||0; if(t<first)first=t; if(t>latest)latest=t; }
                    arr.push({kind, count:events.length, firstSeen:first===Infinity?null:first, latestSeen:latest===-Infinity?null:latest, events});
                }
                return arr;
            }

            function sortSummaries(arr, col, dir) {
                const mult = dir==='asc'?1:-1;
                return [...arr].sort((a,b)=>{
                    let va,vb;
                    switch(col){
                        case 'kind': va=a.kind; vb=b.kind; break;
                        case 'count': va=a.count; vb=b.count; break;
                        case 'firstSeen': va=a.firstSeen||0; vb=b.firstSeen||0; break;
                        case 'latestSeen': va=a.latestSeen||0; vb=b.latestSeen||0; break;
                        default: va=a.kind; vb=b.kind;
                    }
                    return va<vb ? -mult : va>vb ? mult : 0;
                });
            }

            function renderTable(filterText='') {
                let filtered = customKindSummaries;
                if (filterText.trim()) {
                    const s = filterText.trim().toLowerCase();
                    filtered = customKindSummaries.filter(x => String(x.kind).includes(s));
                }
                filtered = sortSummaries(filtered, sortColumn, sortDirection);

                const headers = resultsTable.querySelectorAll('thead th[data-sort]');
                headers.forEach(th => {
                    const col = th.getAttribute('data-sort');
                    const arrow = th.querySelector('.sort-arrow');
                    if (arrow) {
                        arrow.textContent = (col === sortColumn) ? (sortDirection==='asc'?'▲':'▼') : '';
                    }
                    th.style.color = (col === sortColumn) ? 'var(--accent)' : '';
                });

                if (filtered.length === 0) {
                    resultsBody.innerHTML = '';
                    noResults.style.display = 'block';
                } else {
                    noResults.style.display = 'none';
                    resultsBody.innerHTML = filtered.map(s => `
                        <tr>
                            <td><span class="kind-badge">${s.kind}</span></td>
                            <td>${s.count}</td>
                            <td>${formatDate(s.firstSeen)}</td>
                            <td>${formatDate(s.latestSeen)}</td>
                            <td><button class="btn btn-outline btn-xs view-btn" data-kind="${s.kind}">👁 View</button></td>
                        </tr>
                    `).join('');
                    resultsBody.querySelectorAll('.view-btn').forEach(btn => {
                        btn.addEventListener('click', () => showModal(parseInt(btn.dataset.kind)));
                    });
                }
                tableWrapper.style.display = 'block';
                toolbar.style.display = 'flex';
            }

            function showModal(kind) {
                const group = customKindGroups.get(kind);
                if (!group) return;
                modalKindBadge.textContent = kind;
                modalBody.innerHTML = group.map((item, idx) => {
                    const ev = item.event;
                    const relayStr = (item.relayUrls||[]).map(r=>r.replace('wss://','')).join(', ') || 'unknown';
                    const json = JSON.stringify(ev, null, 2);
                    return `<div class="event-card">
                        <div class="event-meta">
                            <span><span class="label">ID:</span> ${ev.id||'—'}</span>
                            <span><span class="label">Created:</span> ${formatDateTime(ev.created_at)}</span>
                            <span><span class="label">Relay:</span> ${relayStr}</span>
                        </div>
                        <pre>${escapeHTML(json)}</pre>
                        <div class="btn-row">
                            <button class="btn btn-outline btn-xs copy-json-btn" data-json="${escapeAttr(json)}">📋 Copy JSON</button>
                            <button class="btn btn-outline btn-xs copy-id-btn" data-id="${ev.id||''}">🔗 Copy ID</button>
                        </div>
                    </div>`;
                }).join('');
                modalBody.querySelectorAll('.copy-json-btn').forEach(b => b.addEventListener('click', ()=> copyToClipboard(unescapeAttr(b.dataset.json),'JSON')));
                modalBody.querySelectorAll('.copy-id-btn').forEach(b => b.addEventListener('click', ()=> copyToClipboard(b.dataset.id,'Event ID')));
                modalOverlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }
            function hideModal() { modalOverlay.style.display='none'; modalBody.innerHTML=''; document.body.style.overflow=''; }
            function escapeHTML(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
            function escapeAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
            function unescapeAttr(s) { const ta = document.createElement('textarea'); ta.innerHTML = s; return ta.value; }

            function exportCSV() {
                if (!customKindSummaries.length) { showToast('No data','error'); return; }
                let csv = 'Kind,Count,First Seen,Latest Seen\n' + customKindSummaries.map(s=>`${s.kind},${s.count},${formatDate(s.firstSeen)},${formatDate(s.latestSeen)}`).join('\n');
                csv += '\n\nEvent ID,Kind,Created At,Relay\n';
                for (const s of customKindSummaries) for (const {event,relayUrls} of s.events) csv += `${event.id},${s.kind},${formatDateTime(event.created_at)},"${(relayUrls||[]).join('; ')}"\n`;
                downloadFile(csv,'nostr-custom-kinds.csv','text/csv');
                showToast('CSV exported','success');
            }
            function exportJSON() {
                if (!customKindSummaries.length) { showToast('No data','error'); return; }
                const obj = {
                    pubkey: currentHexPubkey, npub: currentNpub, exportedAt: new Date().toISOString(),
                    customKinds: customKindSummaries.map(s=>({
                        kind:s.kind, count:s.count,
                        firstSeen: s.firstSeen?formatDateTime(s.firstSeen):null,
                        latestSeen: s.latestSeen?formatDateTime(s.latestSeen):null,
                        events: s.events.map(({event,relayUrls})=>({id:event.id, pubkey:event.pubkey, created_at:event.created_at, kind:event.kind, content:event.content, tags:event.tags, sig:event.sig, relays:relayUrls}))
                    }))
                };
                downloadFile(JSON.stringify(obj,null,2),'nostr-custom-kinds.json','application/json');
                showToast('JSON exported','success');
            }
            function downloadFile(content, name, type) {
                const blob = new Blob([content],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href);
            }

            let relayStatuses = new Map();
            function updateProgress(url, status) { relayStatuses.set(url,status); renderProgress(); }
            function renderProgress() {
                let html = DEFAULT_RELAYS.map(url => {
                    const st = relayStatuses.get(url)||'pending'; let dot='', txt='Pending';
                    if(st==='connecting'){dot='active';txt='Connecting...';} else if(st==='connected'){dot='connected';txt='Connected';} else if(st==='failed'||st==='error'){dot='failed';txt='Failed';}
                    return `<span class="progress-item"><span class="progress-dot ${dot}"></span>${url.replace('wss://','')}: ${txt}</span>`;
                }).join('');
                html += ` | Relays: ${[...relayStatuses.values()].filter(s=>s==='connected').length}/${DEFAULT_RELAYS.length} | Events: ${allEventsMap.size}`;
                if (isScanning) html += ' <span class="spinner"></span> Scanning...';
                progressList.innerHTML = html;
                progressArea.style.display = 'block';
            }
            function resetProgress() { relayStatuses.clear(); progressList.innerHTML=''; progressArea.style.display='none'; }

            async function runScan() {
                if (isScanning) return;
                const raw = npubInput.value.trim();
                if (!raw) { showToast('Enter npub','error'); return; }
                let hex;
                try { hex = decodeNpub(raw); } catch(e) { showToast('Invalid npub: '+e.message,'error'); return; }
                abortController = new AbortController();
                isScanning = true; currentHexPubkey = hex; currentNpub = raw;
                allEventsMap.clear(); customKindGroups.clear(); customKindSummaries=[];
                relayStatuses.clear(); sortColumn='kind'; sortDirection='asc';
                scanBtn.disabled=true; scanBtn.innerHTML='<span class="spinner"></span> Scanning...';
                resetProgress(); statsGrid.style.display='none'; toolbar.style.display='none'; tableWrapper.style.display='none';
                resultsBody.innerHTML=''; noResults.style.display='none'; searchInput.value='';
                for (const url of DEFAULT_RELAYS) relayStatuses.set(url,'pending');
                renderProgress();
                try {
                    const eventsMap = await connectRelays(hex, abortController.signal, updateProgress, (count)=>{ renderProgress(); });
                    mergeEvents(eventsMap);
                    customKindGroups = detectCustomKinds();
                    customKindSummaries = buildSummaries(customKindGroups);
                    customKindSummaries = sortSummaries(customKindSummaries, 'kind', 'asc');
                    renderStats(); renderTable();
                    if(customKindSummaries.length) showToast(`Found ${customKindSummaries.length} custom kind(s)`,'success');
                    else showToast('No custom kinds found','info');
                } catch(e) {
                    if(e.message!=='Aborted') { showToast('Error: '+e.message,'error'); console.error(e); }
                    if(allEventsMap.size) { customKindGroups=detectCustomKinds(); customKindSummaries=buildSummaries(customKindGroups); renderStats(); renderTable(); }
                } finally {
                    isScanning=false; abortController=null; scanBtn.disabled=false; scanBtn.innerHTML='<span>🔎</span> Scan';
                    if (progressList.innerHTML) progressList.innerHTML += '<span class="progress-item" style="color:var(--success);">✔ Finished</span>';
                }
            }

            function clearResults() {
                if (isScanning && abortController) abortController.abort();
                isScanning=false; currentHexPubkey=null; currentNpub=null;
                allEventsMap.clear(); customKindGroups.clear(); customKindSummaries=[];
                relayStatuses.clear(); sortColumn='kind'; sortDirection='asc';
                scanBtn.disabled=false; scanBtn.innerHTML='<span>🔎</span> Scan';
                resetProgress(); statsGrid.style.display='none'; statsGrid.innerHTML='';
                toolbar.style.display='none'; tableWrapper.style.display='none';
                resultsBody.innerHTML=''; noResults.style.display='none';
                searchInput.value=''; npubInput.value=''; hideModal();
            }

            function renderStats() {
                let total=allEventsMap.size, std=0, cus=0, stdSet=new Set(), cusSet=new Set();
                for (const [,{event}] of allEventsMap) {
                    if (STANDARD_KINDS.has(event.kind)) { std++; stdSet.add(event.kind); }
                    else { cus++; cusSet.add(event.kind); }
                }
                statsGrid.innerHTML = [
                    {label:'NPUB',value:currentNpub,small:true},
                    {label:'Hex Pubkey',value:currentHexPubkey,small:true},
                    {label:'Total Events',value:total},
                    {label:'Standard Events',value:std},
                    {label:'Custom Events',value:cus,highlight:true},
                    {label:'Unique Standard Kinds',value:stdSet.size},
                    {label:'Unique Custom Kinds',value:cusSet.size,highlight:true}
                ].map(i=>`<div class="stat-item"><div class="stat-label">${i.label}</div><div class="stat-value${i.highlight?' highlight':''}${i.small?' small':''}">${i.value}</div></div>`).join('');
                statsGrid.style.display='grid';
            }

            scanBtn.addEventListener('click', runScan);
            clearBtn.addEventListener('click', clearResults);
            npubInput.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); runScan(); } });
            searchInput.addEventListener('input', () => renderTable(searchInput.value));
            resultsTable.querySelector('thead').addEventListener('click', e => {
                const th = e.target.closest('th[data-sort]'); if(!th) return;
                const col = th.dataset.sort;
                if(sortColumn===col) sortDirection = sortDirection==='asc'?'desc':'asc';
                else { sortColumn=col; sortDirection='asc'; }
                renderTable(searchInput.value);
            });
            modalClose.addEventListener('click', hideModal);
            modalOverlay.addEventListener('click', e => { if(e.target===modalOverlay) hideModal(); });
            document.addEventListener('keydown', e => { if(e.key==='Escape'&&modalOverlay.style.display==='flex') hideModal(); });
            exportCSVBtn.addEventListener('click', exportCSV);
            exportJSONBtn.addEventListener('click', exportJSON);
            npubInput.focus();
            console.log('Nostr Custom Kind Explorer ready');
        })();
    </script>
</body>
</html>
