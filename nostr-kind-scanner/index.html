<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nostr Kind Explorer & Event Editor</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2333; --border: #30363d;
      --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff; --accent2: #1f6feb;
      --success: #3fb950; --warning: #d29922; --error: #f85149; --purple: #a371f7;
      --radius: 8px; --radius-sm: 5px; --font-mono: monospace; --font-sans: sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-sans);height:100vh;display:flex;}
    .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 10px;gap:8px;flex-shrink:0;}
    .sidebar h2{font-size:1.1rem;margin-bottom:16px;color:var(--accent);}
    .sidebar button{display:block;width:100%;text-align:left;padding:10px 14px;border:none;background:transparent;color:var(--text2);border-radius:var(--radius-sm);font-size:0.9rem;cursor:pointer;transition:all 0.2s;}
    .sidebar button:hover,.sidebar button.active{background:var(--surface2);color:var(--text);}
    .main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:20px;}
    .hidden{display:none !important;}
    .flex{display:flex;} .flex-col{flex-direction:column;} .gap-2{gap:8px;} .gap-3{gap:12px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
    .input-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
    .input-row input{flex:1;min-width:200px;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--font-mono);outline:none;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);border:1px solid transparent;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
    .btn-primary{background:var(--accent2);color:#fff;border-color:var(--accent2);}
    .btn-outline{background:transparent;color:var(--text);border-color:var(--border);}
    .btn-sm{padding:6px 12px;font-size:0.8rem;}
    .btn-xs{padding:3px 8px;font-size:0.7rem;}
    .badge{padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:600;}
    .badge-editable{background:var(--success);color:#000;}
    .badge-readonly{background:var(--border);color:var(--text);}
    .table-wrapper{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);max-height:60vh;}
    table{width:100%;border-collapse:collapse;font-size:0.82rem;min-width:900px;}
    thead th{background:var(--surface2);color:var(--text2);padding:10px 8px;text-align:left;border-bottom:2px solid var(--border);position:sticky;top:0;}
    tbody td{padding:8px;border-bottom:1px solid var(--border);font-family:var(--font-mono);}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:900px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;}
    .modal-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .modal-body{padding:20px;flex:1;}
    .tab-btn{background:transparent;border:none;color:var(--text2);padding:6px 12px;cursor:pointer;border-bottom:2px solid transparent;}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
    .toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);padding:10px 18px;border-radius:var(--radius-sm);z-index:200;}
    .tag-row{display:flex;gap:6px;align-items:center;margin-bottom:4px;}
    .tag-row input{width:120px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:4px;font-family:monospace;}
    .diff-insert{color:var(--success);} .diff-delete{color:var(--error);}
  </style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <h2>🔍 Nostr Tools</h2>
  <button class="active" data-tab="explorer">🌐 Explorer</button>
  <button data-tab="editor">✏️ Editor</button>
  <button data-tab="kindmanager">📚 Kind Manager</button>
  <button data-tab="account">🔑 Account</button>
  <button data-tab="publishlog">📋 Publishing Log</button>
</div>
<div class="main" id="mainContent">
  <!-- Explorer tab (default) -->
  <div id="tab-explorer" class="tab-content">
    <div class="card"><div class="input-row"><input id="npubInput" placeholder="npub1..."><button class="btn btn-primary" id="scanBtn">🔎 Scan</button><button class="btn btn-outline btn-sm" id="clearBtn">✕ Clear</button></div></div>
    <div id="progressArea" class="hidden"><div id="progressList"></div></div>
    <div class="summary-panel card flex gap-2" id="summaryPanel" style="display:none;"></div>
    <div class="toolbar flex gap-2" style="margin-top:10px;"><input id="searchInput" placeholder="Search..."><button class="btn btn-outline btn-sm" id="exportCSVBtn">📄 CSV</button><button class="btn btn-outline btn-sm" id="exportJSONBtn">📦 JSON</button></div>
    <div class="table-wrapper" id="tableWrapper" style="display:none;">
      <table id="resultsTable"><thead><tr><th>Kind</th><th>Name</th><th>Category</th><th>Count</th><th>Editable</th><th>Action</th></tr></thead><tbody id="resultsBody"></tbody></table>
    </div>
  </div>
  <!-- Editor tab (hidden) -->
  <div id="tab-editor" class="tab-content hidden"><div class="card"><p>Select an event to edit from the Explorer.</p></div></div>
  <!-- Kind Manager tab -->
  <div id="tab-kindmanager" class="tab-content hidden"><div class="card"><h3>Kind Reference Manager</h3><p>Customize kind definitions stored locally.</p><textarea id="kindJsonEditor" style="width:100%;height:300px;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:10px;"></textarea><button class="btn btn-primary" id="saveKindDb">💾 Save</button><button class="btn btn-outline" id="resetKindDb">🔄 Reset to built-in</button></div></div>
  <!-- Account tab -->
  <div id="tab-account" class="tab-content hidden"><div class="card"><h3>Account</h3><div id="loginSection"><p>Login with nsec or NIP-07 extension.</p><input id="nsecInput" placeholder="nsec1..." style="width:100%;"><button class="btn btn-primary" id="loginNsec">🔓 Login with nsec</button><button class="btn btn-outline" id="loginNip07">🦊 Login with NIP-07</button></div><div id="loggedInInfo" class="hidden"><p>Logged in as <span id="loggedNpub"></span></p><button class="btn btn-outline" id="logoutBtn">🚪 Logout</button></div></div></div>
  <!-- Publishing Log tab -->
  <div id="tab-publishlog" class="tab-content hidden"><div class="card"><h3>Publishing Log</h3><div id="publishLogList"></div></div></div>
</div>
<div id="modalOverlay" class="modal-overlay hidden"><div class="modal" id="modalContent"></div></div>
<div id="toastContainer"></div>

<script>
(function() {
  // ---- STATE ----
  let currentNpub = null, currentHexPubkey = null, allEventsMap = new Map(), kindSummaries = [];
  let user = { loggedIn: false, pubkey: null, privkey: null, signerType: null }; // nsec or nip07
  let publishLog = [];
  let customKindDB = {};

  // ---- DOM refs ----
  const sidebar = document.getElementById('sidebar');
  const tabs = {
    explorer: document.getElementById('tab-explorer'),
    editor: document.getElementById('tab-editor'),
    kindmanager: document.getElementById('tab-kindmanager'),
    account: document.getElementById('tab-account'),
    publishlog: document.getElementById('tab-publishlog')
  };

  // ---- KIND REFERENCE BASE ----
  const BASE_KIND_REFERENCE = {
    0:{name:"Profile Metadata",nip:"NIP-01",category:"Replaceable",purpose:"User profile"},
    1:{name:"Short Text Note",nip:"NIP-01",category:"Regular",purpose:"Posts"},
    3:{name:"Contact List",nip:"NIP-02",category:"Replaceable",purpose:"Following list"},
    10002:{name:"Relay List",nip:"NIP-65",category:"Replaceable",purpose:"Preferred relays"},
    30023:{name:"Long-form Article",nip:"NIP-23",category:"Addressable",purpose:"Blog article"},
    30078:{name:"Application Data",nip:"NIP-78",category:"Addressable",purpose:"App-specific data"},
    9735:{name:"Zap Receipt",nip:"NIP-57",category:"Regular",purpose:"Proof of payment"},
    // ... (truncated for brevity, full set as before)
  };

  function loadKindDB() {
    const stored = localStorage.getItem('nostr_kind_db');
    if (stored) { try { customKindDB = JSON.parse(stored); } catch(e){} }
    else customKindDB = {};
  }
  function getKindInfo(kind) {
    const merged = { ...BASE_KIND_REFERENCE, ...customKindDB };
    if (merged[kind]) return { ...merged[kind], isUnknown: false };
    return { name:"Unknown", nip:"—", category:"Unknown", purpose:"?", isUnknown:true };
  }
  function isEditableKind(kind) {
    const cat = getKindInfo(kind).category;
    return cat === 'Replaceable' || cat === 'Addressable';
  }

  // ---- NAVIGATION ----
  function switchTab(tabName) {
    Object.values(tabs).forEach(t => t.classList.add('hidden'));
    tabs[tabName].classList.remove('hidden');
    sidebar.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    sidebar.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
  }
  sidebar.addEventListener('click', e => {
    if (e.target.dataset.tab) switchTab(e.target.dataset.tab);
  });

  // ---- LOGIN / AUTH ----
  function updateLoginUI() {
    document.getElementById('loggedInInfo').classList.toggle('hidden', !user.loggedIn);
    document.getElementById('loginSection').classList.toggle('hidden', user.loggedIn);
    if (user.loggedIn) {
      document.getElementById('loggedNpub').textContent = user.pubkey ? toNpub(user.pubkey) : '';
    }
  }
  function toNpub(hex) { /* simple nip19 encode placeholder */ return hex ? 'npub1...' : ''; }
  function logout() {
    user = { loggedIn: false, pubkey: null, privkey: null, signerType: null };
    updateLoginUI();
    showToast('Logged out');
  }
  document.getElementById('logoutBtn').addEventListener('click', logout);

  document.getElementById('loginNsec').addEventListener('click', () => {
    const nsec = document.getElementById('nsecInput').value.trim();
    // minimal nsec decode (to be expanded)
    user = { loggedIn: true, pubkey: 'demo', privkey: nsec, signerType: 'nsec' };
    updateLoginUI();
    showToast('Logged in with nsec (demo)');
  });
  document.getElementById('loginNip07').addEventListener('click', async () => {
    if (!window.nostr) return showToast('No NIP-07 extension found');
    try {
      const pubkey = await window.nostr.getPublicKey();
      user = { loggedIn: true, pubkey, privkey: null, signerType: 'nip07' };
      updateLoginUI();
      showToast('Connected with NIP-07');
    } catch(e) { showToast('NIP-07 error: '+e.message); }
  });

  // ---- SCANNING LOGIC (simplified from previous) ----
  // ... (implement scan, fetchFromRelay, etc. similar to earlier versions)
  // Will keep the scanBtn handler that populates allEventsMap and kindSummaries.

  // ---- TABLE RENDERING ----
  function renderTable(filter = '') {
    let filtered = kindSummaries;
    if (filter) filtered = filtered.filter(s => String(s.kind).includes(filter) || s.name.includes(filter));
    const body = document.getElementById('resultsBody');
    body.innerHTML = filtered.map(s => {
      const editable = isEditableKind(s.kind);
      return `<tr>
        <td><span class="badge">${s.kind}</span></td>
        <td>${s.name}</td><td>${s.category}</td><td>${s.count}</td>
        <td><span class="badge ${editable?'badge-editable':'badge-readonly'}">${editable?'Editable':'Read Only'}</span></td>
        <td><button class="btn btn-xs btn-outline view-edit-btn" data-kind="${s.kind}">${editable?'✏️ Edit':'👁 View'}</button></td>
      </tr>`;
    }).join('');
    document.querySelectorAll('.view-edit-btn').forEach(b => b.addEventListener('click', () => openEditor(parseInt(b.dataset.kind))));
  }

  // ---- EDITOR MODAL ----
  function openEditor(kind) {
    const group = kindGroups.get(kind); if (!group) return;
    const event = group[0].event; // for replaceable, take first
    const info = getKindInfo(kind);
    // Build modal with visual/JSON tabs
    const modal = document.getElementById('modalContent');
    modal.innerHTML = `
      <div class="modal-header"><h3>Edit Kind ${kind} - ${info.name}</h3><button id="closeModalBtn">✕</button></div>
      <div class="modal-body">
        <div class="tabs"><button class="tab-btn active" data-editor="visual">Visual</button><button class="tab-btn" data-editor="json">JSON</button></div>
        <div id="visualEditor" class="editor-panel">${buildVisualEditor(kind, event)}</div>
        <div id="jsonEditor" class="editor-panel hidden"><textarea id="rawJsonText" style="width:100%;height:300px;">${JSON.stringify(event,null,2)}</textarea></div>
        <button class="btn btn-primary" id="signAndPublishBtn">✍️ Sign & Publish</button>
      </div>`;
    document.getElementById('modalOverlay').classList.remove('hidden');
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', function() {
      document.querySelectorAll('.editor-panel').forEach(p => p.classList.add('hidden'));
      document.getElementById(this.dataset.editor+'Editor').classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
    }));
    document.getElementById('signAndPublishBtn').addEventListener('click', () => signAndPublish(kind, event));
  }
  function buildVisualEditor(kind, event) {
    if (kind === 0) return profileEditor(event);
    if (kind === 3) return contactListEditor(event);
    if (kind === 10002) return relayListEditor(event);
    return genericEditor(event);
  }
  function profileEditor(event) {
    const c = JSON.parse(event.content||'{}');
    return `<input placeholder="Name" value="${c.name||''}"><input placeholder="About" value="${c.about||''}">...`;
  }
  function contactListEditor(event) { return `<textarea>${event.content}</textarea>`; }
  function relayListEditor(event) { return `<textarea>${event.content}</textarea>`; }
  function genericEditor(event) { return `<textarea>${event.content}</textarea>`; }

  function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }

  async function signAndPublish(kind, originalEvent) {
    // get edited event from form
    const edited = { ...originalEvent, content: document.querySelector('#rawJsonText')?.value || originalEvent.content };
    // sign
    let signed;
    if (user.signerType === 'nip07') {
      signed = await window.nostr.signEvent(edited);
    } else if (user.signerType === 'nsec') {
      // use local signer
    } else return showToast('Not logged in');
    // publish to relays
    for (let relay of DEFAULT_RELAYS) {
      try {
        const ws = new WebSocket(relay);
        ws.onopen = () => ws.send(JSON.stringify(['EVENT', signed]));
        publishLog.push({relay, status:'sent', time: new Date()});
      } catch(e) { publishLog.push({relay, status:'error'}); }
    }
    renderPublishLog();
    showToast('Published');
  }

  // ---- OTHER TABS ----
  function renderPublishLog() {
    const list = document.getElementById('publishLogList');
    list.innerHTML = publishLog.map(l => `<div>${l.relay}: ${l.status}</div>`).join('');
  }

  // ---- INITIALIZATION ----
  loadKindDB();
  updateLoginUI();
  // wire scan button (placeholder)
  document.getElementById('scanBtn').addEventListener('click', () => {
    // simulate scan
    kindSummaries = [{kind:0, name:'Profile', category:'Replaceable', count:1}, {kind:1, name:'Note', category:'Regular', count:5}];
    renderTable();
  });

  function showToast(msg) { /* simple toast */ }
})();
</script>
</body>
</html>
